name: Bug Report
about: File a bug report
labels:
  - "Type/Report"
  - "Status/Needs Triage"
  - "Priority/Normal"
body:
  - type: markdown
    attributes:
      value: |
          Thank you for wanting to submit a report and help me improve CloudRig. Please don't write your bug report from scratch! I've put buttons in the Blender interface which will start a report for you with a lot of  useful information pre-filled.

          * If your bug is about a metarig that fails to generate:
              * Select your metarig and go to Properties->Object Data->CloudRig->Generation Log, and click on "Report Bug".
          * For all other bugs:
              * Go to Edit->Preferences->Add-ons->CloudRig and click on "Report a Bug."
          * For feature suggestions:
              * In this case you may delete this text and write from scratch.

  - type: textarea
    id: body
    attributes:
      label: "Description"
      hide_label: true
      value: |
               **System Information**
               Operating system:

               Blender Version: 
               CloudRig Version: 

               **Short description of error**

               **Exact steps for others to reproduce the error**
               Based on the default human metarig or a simplified attached .blend file.

  - type: markdown
    attributes:
      value: |
                ### Please provide a .blend file with bug reports.  
                ### Please make sure you use the CloudRig version that corresponds to your Blender version.